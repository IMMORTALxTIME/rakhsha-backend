version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rakhsha-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file: .env
    volumes:
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - rakhsha-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: rakhsha-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-rakhsha_redis_pass} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - rakhsha-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ml-service:
    image: python:3.11-slim
    container_name: rakhsha-ml
    restart: unless-stopped
    working_dir: /app
    command: >
      sh -c "pip install -q xgboost scikit-learn pandas numpy psycopg2-binary &&
             python scripts/train_model.py --mode both --port 8001"
    ports:
      - "8001:8001"
    env_file: .env
    volumes:
      - ./scripts:/app/scripts
    networks:
      - rakhsha-net

  nginx:
    image: nginx:alpine
    container_name: rakhsha-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend
    networks:
      - rakhsha-net

volumes:
  redis_data:

networks:
  rakhsha-net:
    driver: bridge
